services:
  mongo:
    image: mongo:7
    container_name: bizscout-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bizscout

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bizscout-backend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - mongo
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/bizscout
      PING_TARGET_URL: https://httpbin.org/anything
      PING_INTERVAL_CRON: "*/5 * * * * *"
      PING_TIMEOUT_MS: 10000
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: info
      ANOMALY_WINDOW_HOURS: 24
      ANOMALY_Z_THRESHOLD: 3
      ANOMALY_MIN_SAMPLES: 10
      EWMA_ALPHA: 0.3
      RESPONSE_TTL_DAYS: 30
      API_KEY: "1234512345123456"
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bizscout-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_SOCKET_URL: http://localhost:4000
      VITE_API_KEY: "1234512345123456"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  mongo-data:
  backend-node-modules:
  frontend-node-modules:
